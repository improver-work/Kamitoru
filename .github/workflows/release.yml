name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          if (Test-Path $bundleDir) {
            Remove-Item "$bundleDir" -Force -Recurse
            Write-Host "Cleaned entire bundle directory"
          }

      - name: Build Tauri app
        run: npx tauri build

      - name: Sign NSIS installer
        shell: pwsh
        env:
          KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:KEY_BASE64.Trim()
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:KEY_PASSWORD
          $exe = (Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1).FullName
          Write-Host "Signing: $exe"
          & npx tauri signer sign "$exe"
          Get-ChildItem "src-tauri\target\release\bundle\nsis" | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "カミトル デスクトップ v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Generate updater manifest (latest.json)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Get actual asset URLs from GitHub API (filenames may differ from local)
          $release = gh api "repos/${{ github.repository }}/releases/tags/v$version" | ConvertFrom-Json
          $exeAsset = $release.assets | Where-Object { $_.name -like "*.exe" -and $_.name -notlike "*.exe.sig" } | Select-Object -First 1
          $sigAsset = $release.assets | Where-Object { $_.name -like "*.exe.sig" } | Select-Object -First 1
          $exeUrl = if ($exeAsset) { $exeAsset.browser_download_url } else { "" }
          $signature = ""
          if ($sigAsset) {
            # Download .sig file content from release
            $sigContent = gh api $sigAsset.url -H "Accept: application/octet-stream" 2>$null
            if ($sigContent) { $signature = ($sigContent -join "`n").Trim() }
          }
          # Fallback: read from local if API failed
          if (-not $signature) {
            $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($sigFile) { $signature = (Get-Content $sigFile.FullName -Raw).Trim() }
          }
          Write-Host "Exe URL: $exeUrl"
          Write-Host "Signature length: $($signature.Length)"
          $manifest = @{
            version = $version
            notes = "カミトル デスクトップ v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $exeUrl
              }
            }
          } | ConvertTo-Json -Depth 4
          $manifest | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $manifest

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
