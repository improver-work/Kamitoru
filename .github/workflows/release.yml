name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsisDir) {
            Remove-Item "$nsisDir/*" -Force -Recurse
            Write-Host "Cleaned NSIS output directory"
          }

      - name: Build Tauri app
        run: npx tauri build

      - name: Sign NSIS installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Decode base64 key
          $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:TAURI_SIGNING_PRIVATE_KEY_BASE64.Trim()))
          # Write key to temp file (tauri signer reads from file or env)
          $keyFile = "$env:RUNNER_TEMP\signing.key"
          [System.IO.File]::WriteAllText($keyFile, $decoded, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Key file: $keyFile ($(( Get-Item $keyFile).Length) bytes)"
          # Find the exe
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $exeFile = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exeFile) { Write-Error "No exe found"; exit 1 }
          Write-Host "Signing: $($exeFile.Name)"
          # Sign using tauri signer
          $env:TAURI_SIGNING_PRIVATE_KEY = $decoded
          npx tauri signer sign $exeFile.FullName -p $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # Verify sig file was created
          $sigFile = "$($exeFile.FullName).sig"
          if (Test-Path $sigFile) {
            Write-Host "Signature created: $sigFile ($((Get-Item $sigFile).Length) bytes)"
          } else {
            Write-Error "Signature file NOT created"
            exit 1
          }

      - name: List build artifacts
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }
          }

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "カミトル デスクトップ v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Generate updater manifest (latest.json)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $signature = ""
          $exeName = ""
          if (Test-Path $nsisDir) {
            $sigFile = Get-ChildItem $nsisDir -Filter "*.exe.sig" | Select-Object -First 1
            $exeFile = Get-ChildItem $nsisDir -Filter "*.exe" | Where-Object { $_.Name -notlike "*.exe.sig" } | Select-Object -First 1
            if ($sigFile) { $signature = (Get-Content $sigFile.FullName -Raw).Trim() }
            if ($exeFile) { $exeName = $exeFile.Name }
          }
          $manifest = @{
            version = $version
            notes = "カミトル デスクトップ v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/improver-work/Kamitoru/releases/download/v$version/$exeName"
              }
            }
          } | ConvertTo-Json -Depth 4
          $manifest | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $manifest

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
