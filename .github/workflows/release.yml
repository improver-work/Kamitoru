name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build signed Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "カミトル デスクトップ v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SIG_FILE=$(ls src-tauri/target/release/bundle/nsis/*.exe.sig 2>/dev/null | head -1)
          EXE_FILE=$(ls src-tauri/target/release/bundle/nsis/*.exe 2>/dev/null | head -1)
          EXE_NAME=$(basename "$EXE_FILE")
          SIGNATURE=""
          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
          fi
          printf '{"version":"%s","notes":"カミトル デスクトップ v%s","pub_date":"%s","platforms":{"windows-x86_64":{"signature":"%s","url":"https://github.com/improver-work/Kamitoru/releases/download/v%s/%s"}}}' \
            "$VERSION" "$VERSION" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIGNATURE" "$VERSION" "$EXE_NAME" \
            | python -m json.tool > latest.json

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
